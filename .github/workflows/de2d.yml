name: Split and Release

on: workflow_dispatch

jobs:
  split:
    runs-on: ubuntu-latest
    
    steps:
      - name: Get file
        run: |
          # 下载你的文件
          echo "下载文件..."
          
      - name: Split it
        run: |
          split -b 1500M the-file.zip the-file.part.
          
      - name: Upload
        uses: softprops/action-gh-release@v1
        with:
          tag_name: split-file
          name: "Split File"
          body: "cat the-file.part.* > the-file.zip"
          files: the-file.part.*
