name: Download, Split and Release

on:
  workflow_dispatch:
    inputs:
      url:
        description: '文件下载链接'
        required: true
        type: string
      filename:
        description: '保存的文件名（如 file.zip）'
        required: true
        default: 'file.zip'
        type: string
      split_size:
        description: '分卷大小（如 1500M）'
        required: false
        default: '1500M'
        type: string

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 安装工具
        run: sudo apt-get update && sudo apt-get install -y p7zip-full aria2
        
      - name: 下载文件
        run: |
          echo "开始下载..."
          aria2c -x 16 -s 16 "${{ inputs.url }}" -o "${{ inputs.filename }}"
          
      - name: 7z分卷
        run: |
          echo "正在分卷压缩..."
          7z a -v${{ inputs.split_size }} -mx=0 split.7z "${{ inputs.filename }}"
          
      - name: 获取当前时间
        id: date
        run: |
          echo "date=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
          
      - name: 创建GitHub Release
        uses: actions/create-release@v1
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: split-${{ steps.date.outputs.date }}
          release_name: Split Files ${{ steps.date.outputs.date }}
          body: |
            Split archive files. Download all split.7z.* files
          draft: false
          prerelease: false
          
      - name: 上传分卷文件到Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./split.7z.*
          asset_name: split.7z
          asset_content_type: application/x-7z-compressed
