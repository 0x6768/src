name: Download, Split and Release

on:
  workflow_dispatch:
    inputs:
      url:
        description: '文件下载链接'
        required: true
        type: string
      filename:
        description: '保存的文件名'
        required: true
        default: 'file.zip'
        type: string
      split_size:
        description: '分卷大小（如 1500M）'
        required: false
        default: '1500M'
        type: string
      compress:
        description: '是否压缩分卷（0-不压缩，1-压缩）'
        required: false
        default: '0'
        type: string

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 安装工具
        run: sudo apt-get update && sudo apt-get install -y p7zip-full aria2
        
      - name: 下载文件
        run: |
          echo "开始下载..."
          aria2c -x 16 -s 16 "${{ inputs.url }}" -o "${{ inputs.filename }}"
          
          # 检查文件是否下载成功
          if [ ! -f "${{ inputs.filename }}" ]; then
            echo "错误：文件下载失败！"
            exit 1
          fi
          
          FILE_SIZE=$(stat -c%s "${{ inputs.filename }}" 2>/dev/null || stat -f%z "${{ inputs.filename }}" 2>/dev/null || echo "0")
          if [ "$FILE_SIZE" -eq 0 ]; then
            echo "错误：下载的文件大小为0！"
            exit 1
          fi
          
          echo "✓ 下载完成，文件大小: $((FILE_SIZE/1024/1024)) MB"
          
      - name: 使用split命令分割文件
        id: split_files
        run: |
          echo "使用split命令分割文件..."
          echo "分卷大小: ${{ inputs.split_size }}"
          
          # 计算分卷数量
          FILE_SIZE=$(stat -c%s "${{ inputs.filename }}" 2>/dev/null || stat -f%z "${{ inputs.filename }}" 2>/dev/null || echo "0")
          SPLIT_SIZE_NUM=$(echo "${{ inputs.split_size }}" | sed 's/M/*1024 * 1024/;s/G/*1024 * 1024 * 1024/;s/K/*1024/' | bc)
          NUM_PARTS=$(( (FILE_SIZE + SPLIT_SIZE_NUM - 1) / SPLIT_SIZE_NUM ))
          
          echo "预计分卷数量: $NUM_PARTS"
          
          # 使用split命令分割
          split -b "${{ inputs.split_size }}" --numeric-suffixes=1 --suffix-length=3 "${{ inputs.filename }}" "split_part."
          
          # 重命名为.001格式
          for file in split_part.*; do
            suffix="${file#split_part.}"
            new_name="split.$suffix"
            mv "$file" "$new_name"
            echo "创建分卷: $new_name"
          done
          
          # 列出生成的文件
          echo "生成的分卷文件:"
          ls -lh split.*
          
          # 输出分卷数量供后续步骤使用
          echo "split_count=$(ls split.* 2>/dev/null | wc -l)" >> $GITHUB_OUTPUT
          
      - name: 可选压缩分卷
        if: inputs.compress == '1'
        run: |
          echo "压缩分卷文件..."
          for file in split.*; do
            if [ "$file" != "split.*" ]; then
              echo "压缩: $file -> $file.7z"
              7z a -mx=1 "$file.7z" "$file"
              rm "$file"
            fi
          done
          
      - name: 获取当前时间
        id: date
        run: |
          echo "date=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
          
      - name: 创建GitHub Release
        uses: actions/create-release@v1
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: split-${{ steps.date.outputs.date }}
          release_name: Split Files ${{ steps.date.outputs.date }}
          body: |
            分卷文件。下载所有 split.* 文件。
            
            下载后合并文件:
