# .github/workflows/auto-update.yml
name: Auto Update and PR

on:
  # 你可以根据需要选择触发条件，例如：
  # 1. 定时触发（每天凌晨）
  # 2. 手动触发（在 GitHub 页面上点击运行）
  workflow_dispatch:

jobs:
  update-and-pr:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码（关键：必须检出，且通常不需要额外配置 Git 用户）
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 【核心】执行你的修改逻辑（这里以修改 version.txt 为例）
      - name: Modify files
        run: |
          echo "New version: $(date)" >> version.txt
          # 或者运行你的 Python/Node 脚本
          # python update_script.py

      # 3. 自动创建 PR（检测上一步的修改）
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          # 使用默认的 GITHUB_TOKEN 即可（需在仓库设置中开启读写权限）
          token: ${{ secrets.MY_TOKEN }}
          # PR 分支名（建议带前缀，避免冲突）
          branch: auto-update/version
          # 目标分支（要把 PR 合并到哪）
          base: main
          # PR 标题
          title: "chore: Auto-update version.txt"
          # PR 正文（支持 Markdown）
          body: |
            This PR was auto-generated by GitHub Actions.
            - Updated `version.txt` with latest timestamp.
          # 提交信息
          commit-message: "chore: auto-update version.txt"
          # 标签（方便识别）
          labels: automated-pr, chore
