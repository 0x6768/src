name: Fetch Artifact and Upload to Release

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Workflow Run ID'
        required: false
        default: ''
      artifact_name:
        description: 'Artifact name'
        required: true
        default: 'youtube-videos'
      release_tag:
        description: 'Release tag'
        required: true
        default: 'v1.0.0'

jobs:
  fetch-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup
        id: setup
        run: |
          REPO="${{ github.repository }}"
          TOKEN="${{ secrets.GITHUB_TOKEN }}"
          
          if [ -z "${{ inputs.run_id }}" ]; then
            echo "Finding latest successful run..."
            RUN_JSON=$(curl -s -H "Authorization: token $TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$REPO/actions/runs?status=success&per_page=1")
            RUN_ID=$(echo "$RUN_JSON" | jq -r '.workflow_runs[0].id // empty')
          else
            RUN_ID="${{ inputs.run_id }}"
          fi
          
          if [ -z "$RUN_ID" ]; then
            echo "No successful runs found"
            exit 1
          fi
          
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          
      - name: Install tools
        run: sudo apt-get install -y jq curl
        
      - name: Find artifact
        id: find_artifact
        run: |
          REPO="${{ github.repository }}"
          TOKEN="${{ secrets.GITHUB_TOKEN }}"
          RUN_ID="${{ steps.setup.outputs.run_id }}"
          ARTIFACT_NAME="${{ inputs.artifact_name }}"
          
          ARTIFACTS_JSON=$(curl -s -H "Authorization: token $TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO/actions/runs/$RUN_ID/artifacts")
          
          ARTIFACT_ID=$(echo "$ARTIFACTS_JSON" | jq -r ".artifacts[] | select(.name == \"$ARTIFACT_NAME\") | .id")
          
          if [ -z "$ARTIFACT_ID" ] || [ "$ARTIFACT_ID" = "null" ]; then
            echo "Available artifacts:"
            echo "$ARTIFACTS_JSON" | jq -r '.artifacts[].name'
            exit 1
          fi
          
          echo "artifact_id=$ARTIFACT_ID" >> $GITHUB_OUTPUT
          
      - name: Download artifact
        id: download
        run: |
          REPO="${{ github.repository }}"
          TOKEN="${{ secrets.GITHUB_TOKEN }}"
          ARTIFACT_ID="${{ steps.find_artifact.outputs.artifact_id }}"
          ARTIFACT_NAME="${{ inputs.artifact_name }}"
          
          curl -L -H "Authorization: token $TOKEN" \
            "https://api.github.com/repos/$REPO/actions/artifacts/$ARTIFACT_ID/zip" \
            -o "$ARTIFACT_NAME.zip" \
            --retry 3
            
          echo "file_downloaded=true" >> $GITHUB_OUTPUT
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.release_tag }}
          name: Release ${{ inputs.release_tag }}
          body: |
            ## Artifact Download
            
            Auto-generated from GitHub Actions artifact.
            
            - **Artifact**: ${{ inputs.artifact_name }}
            - **Workflow Run**: ${{ steps.setup.outputs.run_id }}
            - **Generated**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
            
            > Permanent download link
          files: ${{ inputs.artifact_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
