# .github/workflows/fast-download.yml
name: Fast YouTube Download

on:
  workflow_dispatch:  # 手动触发
    inputs:
      playlist_url:
        description: 'YouTube播放列表URL'
        required: true
        default: 'https://www.youtube.com/playlist?list=PL8Z0MhYCLkZlOL-65EUaQ66DRnNdSwhE8'
      quality:
        description: '视频质量'
        required: true
        default: '720p'
        type: choice
        options:
        - 360p
        - 480p
        - 720p
        - 1080p

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # 2小时超时
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup environment
      run: |
        sudo apt update
        sudo apt install -y ffmpeg aria2
        pip install yt-dlp
        
    - name: Download playlist
      env:
        PLAYLIST_URL: ${{ github.event.inputs.playlist_url }}
        QUALITY: ${{ github.event.inputs.quality }}
      run: |
        # 根据质量选择格式
        if [ "$QUALITY" = "720p" ]; then
          FORMAT="bestvideo[height<=720][ext=mp4]+bestaudio[ext=m4a]/best[height<=720]"
        elif [ "$QUALITY" = "1080p" ]; then
          FORMAT="bestvideo[height<=1080][ext=mp4]+bestaudio[ext=m4a]/best[height<=1080]"
        elif [ "$QUALITY" = "480p" ]; then
          FORMAT="bestvideo[height<=480][ext=mp4]+bestaudio[ext=m4a]/best[height<=480]"
        else
          FORMAT="bestvideo[height<=360][ext=mp4]+bestaudio[ext=m4a]/best[height<=360]"
        fi
        
        echo "下载质量: $QUALITY"
        echo "格式: $FORMAT"
        
        # 使用yt-dlp下载
        yt-dlp \
          -f "$FORMAT" \
          --write-subs --sub-langs "zh-Hans,zh-Hant,en" \
          --write-auto-subs \
          --embed-subs \
          --embed-thumbnail \
          --embed-chapters \
          --concurrent-fragments 5 \
          --downloader aria2c \
          --downloader-args "aria2c: -x 16 -s 16 -k 1M" \
          --limit-rate 50M \
          --retries 10 \
          --fragment-retries 10 \
          --socket-timeout 30 \
          --output "%(playlist_index)03d_%(title).80s.%(ext)s" \
          --progress \
          --newline \
          --no-overwrites \
          --match-filter "!is_live" \
          "$PLAYLIST_URL"
          
    - name: Create archive
      run: |
        # 创建压缩包
        tar -czf videos.tar.gz *.mp4
        ls -lh *.mp4 videos.tar.gz
        
    - name: Upload to GitHub Releases
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: videos.tar.gz
        body: "YouTube视频下载 - $(date)"
        
    - name: Upload as artifact
      uses: actions/upload-artifact@v4
      with:
        name: youtube-videos
        path: |
          *.mp4
          videos.tar.gz
        retention-days: 7
